<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Text</title>
</head>
<body>

    <header>
        <h1>Simple Text Display Page</h1>
    </header>

    <main>
        <p id="displayPara">Your text will appear here after you click the button.</p>

        <label for="userInput">Enter something:</label>
        <input type="text" id="userInput" placeholder="Please write in it" />

        <button id="btn">Show Text</button>
        <script src="app.js"></script>
    </main>

    
   

</body>
</html>
